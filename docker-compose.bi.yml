# Dashboard BI — Fazenda Mock
# Stack: PostgREST + nginx (HTML5/CSS/JS)
# Portas padrão VPS-safe (3000 costuma estar ocupada pelo gesto-app-frontend-1)
# Override via .env.bi: BI_PGRST_PORT (default 3010), BI_NGINX_PORT (default 8088)

services:
  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: fazenda-mock-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: ${PGRST_DB_URI}
      PGRST_DB_SCHEMAS: agro
      PGRST_DB_ANON_ROLE: agro_mock_readonly
      PGRST_OPENAPI_SERVER_PROXY_URI: http://127.0.0.1:${BI_PGRST_PORT:-3010}
    ports:
      - "127.0.0.1:${BI_PGRST_PORT:-3010}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  bi-nginx:
    image: nginx:alpine
    container_name: fazenda-mock-bi-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BI_NGINX_PORT:-8088}:80"
    volumes:
      - ./bi:/usr/share/nginx/html:ro
      - ./bi/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - postgrest
