user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Rate limit API readonly — burst alto para carga inicial (12 views em paralelo)
    limit_req_zone $binary_remote_addr zone=demo_api:10m rate=120r/m;

    # CORS restrito — sem wildcard
    map $http_origin $cors_allow_origin {
        default "";
        "~^https://demo-agro\.heliosavio\.com$" $http_origin;
        "~^https://(www\.)?heliosavio\.com$" $http_origin;
        "~^http://127\.0\.0\.1:808[0-9]$" $http_origin;
        "~^http://localhost:808[0-9]$" $http_origin;
    }

    include /etc/nginx/conf.d/*.conf;
}
